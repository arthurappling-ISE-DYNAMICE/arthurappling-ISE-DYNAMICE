<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prime Pathwy — Sovereign Engine Installer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg:         #080808;
      --gold:       #B8952A;
      --gold-bright:#C9A84C;
      --white:      #F0F0F0;
      --text-dim:   #A0A0A0;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--white);
      font-family: 'Barlow Condensed', sans-serif;
      overflow-x: hidden;
    }

    /* ── SECTION 01: SOVEREIGN HERO ─────────────────────────── */
    #hero {
      position: relative;
      width: 100%;
      height: 100vh;
      min-height: 600px;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
      overflow: hidden;
    }

    /* Background image */
    #hero-bg {
      position: absolute;
      inset: 0;
      background-image: url('hero_anchor_clean.jpg');
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
      z-index: 0;
    }

    /* Gradient overlay: #080808 top → transparent center */
    #hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        #080808 0%,
        rgba(8,8,8,0.72) 22%,
        rgba(8,8,8,0.18) 48%,
        transparent 62%
      );
      z-index: 1;
    }

    /* Bottom fade so page transitions cleanly */
    #hero-overlay-bottom {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 25%;
      background: linear-gradient(to bottom, transparent 0%, #080808 100%);
      z-index: 1;
    }

    /* Typography container — upper third */
    #hero-text {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 960px;
      padding: 7vh 40px 0 40px;
      text-align: center;
    }

    .hero-eyebrow {
      display: block;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(11px, 1.1vw, 14px);
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 18px;
    }

    .hero-headline {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(42px, 7.5vw, 96px);
      font-weight: 900;
      line-height: 0.95;
      letter-spacing: -0.01em;
      color: var(--white);
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    .hero-sub {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(24px, 3.8vw, 52px);
      font-weight: 700;
      line-height: 1.05;
      letter-spacing: 0.02em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 36px;
    }

    /* Gold rule divider */
    .hero-rule {
      width: 64px;
      height: 2px;
      background: var(--gold);
      margin: 0 auto 32px auto;
    }

    /* CTA button */
    .hero-cta {
      display: inline-block;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(13px, 1.3vw, 16px);
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--bg);
      background: var(--gold);
      padding: 14px 40px;
      border: none;
      border-radius: 0;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .hero-cta:hover {
      background: var(--gold-bright);
    }

    /* ── RESPONSIVE ─────────────────────────────────────────── */
    @media (max-width: 640px) {
      #hero-text {
        padding-top: 9vh;
        padding-left: 24px;
        padding-right: 24px;
      }
      .hero-headline {
        font-size: clamp(36px, 10vw, 56px);
      }
      .hero-sub {
        font-size: clamp(20px, 6vw, 32px);
      }
    }
  </style>
</head>
<body>

  <!-- ── SECTION 01: SOVEREIGN HERO ───────────────────────── -->
  <section id="hero">
    <div id="hero-bg" style="position:absolute;inset:0;background-image:url('hero_anchor_clean.jpg');background-size:cover;background-position:center center;z-index:0;"></div>
    <div id="hero-overlay"></div>
    <div id="hero-overlay-bottom"></div>

    <div id="hero-text">
      <span class="hero-eyebrow">AA Capital INC dba Prime Pathwy &nbsp;·&nbsp; Vallejo, CA</span>
      <h1 class="hero-headline">Stop Trading<br>Labor for Chaos.</h1>
      <p class="hero-sub">Install a Sovereign Engine.</p>
      <div class="hero-rule"></div>
      <a class="hero-cta" href="#apply">Apply for Installation &rarr;</a>
    </div>
  </section>

</body>
</html>
